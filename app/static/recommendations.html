<!DOCTYPE html>
<html lang="ru">
<head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1"> <title>Рекомендации · Кодекс v2</title> <link rel="stylesheet" href="/static/style.css"> <style> .recs-wrap { max-width: 820px; background: var(--color-card); border: 1px solid var(--color-card-border); border-radius: var(--radius-lg); padding: var(--space-10); line-height: var(--leading-relaxed); } .recs-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-6); padding-bottom: var(--space-4); border-bottom: 1px solid var(--color-divider); } .md h1, .md h2, .md h3, .md h4 { color: var(--color-text); font-weight: var(--weight-bold); letter-spacing: var(--tracking-tight); margin: var(--space-6) 0 var(--space-3); line-height: var(--leading-tight); } .md h1 { font-size: var(--text-2xl); margin-top: 0; } .md h2 { font-size: var(--text-xl); padding-top: var(--space-4); border-top: 1px solid var(--color-divider); } .md h3 { font-size: var(--text-md); color: var(--color-accent); } .md p { margin: 0 0 var(--space-4); } .md strong { font-weight: var(--weight-bold); color: var(--color-text); } .md em { font-style: italic; color: var(--color-text-2); } .md ul, .md ol { margin: 0 0 var(--space-4); padding-left: var(--space-6); } .md li { margin: var(--space-2) 0; } .md code { background: var(--color-divider); padding: 2px 6px; border-radius: var(--radius-sm); font-family: var(--font-mono); font-size: 0.92em; } .md hr { border: none; border-top: 1px dashed var(--color-card-border); margin: var(--space-6) 0; } .md table { border-collapse: collapse; margin: var(--space-4) 0; width: 100%; font-size: var(--text-sm); } .md th, .md td { padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--color-divider); text-align: left; } .md th { font-weight: var(--weight-semibold); color: var(--color-text-2); background: var(--color-bg); } .updating::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--color-accent); display: inline-block; margin-right: 6px; animation: pulse 1.4s ease-in-out infinite; } @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} } </style>
</head>
<body> <div class="app"> <aside class="sidebar" id="appSidebar" data-page="briefing"></aside> <script src="/static/nav.js"></script> <main class="main"> <header class="page-header"> <h1 class="page-title">Рекомендации на сегодня</h1> <p class="page-subtitle">Главы для quick wins + улучшения функционала. Обновляется каждое утро через Opus 4.7.</p> </header> <div class="recs-wrap"> <div class="recs-meta"> <div id="meta" style="font-size:var(--text-sm);color:var(--color-text-2)">Загружаю...</div> <div style="display:flex;gap:var(--space-2)"> <button class="btn btn-secondary btn-sm" id="refreshBtn">Перечитать</button> <button class="btn btn-primary btn-sm" id="updateBtn">Перегенерировать через Opus</button> </div> </div> <div class="md" id="content">Загружаю...</div> </div> <footer class="page-footer"> Файл: <code>~/Desktop/Codex2/reports/DAILY-RECOMMENDATIONS-TODAY.md</code> </footer> </main> </div> <style> .toast-container { position: fixed; bottom: var(--space-6); right: var(--space-6); z-index: var(--z-toast); display: flex; flex-direction: column; gap: var(--space-2); pointer-events: none; } .toast { background: var(--color-text); color: var(--color-text-inverse); padding: var(--space-3) var(--space-4); border-radius: var(--radius-md); font-size: var(--text-sm); box-shadow: var(--shadow-md); max-width: 320px; pointer-events: auto; } </style> <script>
 function toast(msg, ms = 3000) {
   let c = document.querySelector(".toast-container");
   if (!c) {
     c = document.createElement("div");
     c.className = "toast-container";
     document.body.appendChild(c);
   }
   const el = document.createElement("div");
   el.className = "toast";
   el.textContent = msg;
   c.appendChild(el);
   setTimeout(() => el.remove(), ms);
 }

 function escape(s) {
   return String(s || "").replace(/[&<>]/g, c => ({
     "&": "&amp;",
     "<": "&lt;",
     ">": "&gt;"
   } [c]));
 }

 function renderMd(md) {
   /* Reuse renderer like in morning-plan.html */
   const lines = md.split("\n");
   let html = "",
     inCode = false,
     inList = false,
     listType = "ul",
     inTable = false,
     tableHeader = false;
   const inline = s => escape(s).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(
     /(^|[^*])\*([^*\n]+)\*([^*]|$)/g, '$1<em>$2</em>$3').replace(/`([^`]+)`/g, '<code>$1</code>').replace(
     /\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
   const closeList = () => {
     if (inList) {
       html += `</${listType}>\n`;
       inList = false;
     }
   };
   const closeTable = () => {
     if (inTable) {
       html += "</tbody></table>\n";
       inTable = false;
       tableHeader = false;
     }
   };
   for (const line of lines) {
     if (line.startsWith("```")) {
       closeList();
       closeTable();
       if (inCode) {
         html += "</code></pre>\n";
         inCode = false;
       } else {
         html += '<pre><code>';
         inCode = true;
       }
       continue;
     }
     if (inCode) {
       html += escape(line) + "\n";
       continue;
     }
     const h = line.match(/^(#{1,4})\s+(.+)$/);
     if (h) {
       closeList();
       closeTable();
       html += `<h${h[1].length}>${inline(h[2])}</h${h[1].length}>\n`;
       continue;
     }
     if (/^[-=*]{3,}$/.test(line.trim())) {
       closeList();
       closeTable();
       html += "<hr>\n";
       continue;
     }
     if (/^\|.*\|$/.test(line.trim())) {
       closeList();
       if (!inTable) {
         html += '<table><thead><tr>';
         line.trim().slice(1, -1).split("|").forEach(c => html += `<th>${inline(c.trim())}</th>`);
         html += '</tr></thead><tbody>';
         inTable = true;
         tableHeader = true;
         continue;
       }
       if (tableHeader && /^\|[\s\-:|]+\|$/.test(line.trim())) {
         tableHeader = false;
         continue;
       }
       html += '<tr>';
       line.trim().slice(1, -1).split("|").forEach(c => html += `<td>${inline(c.trim())}</td>`);
       html += '</tr>';
       continue;
     }
     const ul = line.match(/^\s*[-*]\s+(.+)$/);
     if (ul) {
       closeTable();
       if (!inList || listType !== "ul") {
         closeList();
         html += "<ul>\n";
         inList = true;
         listType = "ul";
       }
       html += `<li>${inline(ul[1])}</li>\n`;
       continue;
     }
     const ol = line.match(/^\s*\d+\.\s+(.+)$/);
     if (ol) {
       closeTable();
       if (!inList || listType !== "ol") {
         closeList();
         html += "<ol>\n";
         inList = true;
         listType = "ol";
       }
       html += `<li>${inline(ol[1])}</li>\n`;
       continue;
     }
     if (line.trim() === "") {
       closeList();
       closeTable();
       continue;
     }
     closeList();
     closeTable();
     html += `<p>${inline(line)}</p>\n`;
   }
   closeList();
   closeTable();
   return html;
 }

 function fmtDate(ts) {
   const d = new Date(ts * 1000);
   const months = ["янв", "фев", "мар", "апр", "мая", "июн", "июл", "авг", "сен", "окт", "ноя", "дек"];
   return `${d.getDate()} ${months[d.getMonth()]} ${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`;
 }
 async function load() {
   document.getElementById("content").textContent = "Загружаю...";
   try {
     const r = await fetch("/api/recommendations?ts=" + Date.now());
     const d = await r.json();
     if (!d.exists) {
       document.getElementById("meta").textContent = "Ещё не сгенерировано";
       document.getElementById("content").innerHTML =
         `<p>${escape(d.message || "")}</p><p>Нажми <strong>Перегенерировать через Opus</strong>.</p>`;
       return;
     }
     document.getElementById("meta").innerHTML =
       `Обновлено: <strong>${fmtDate(d.mtime)}</strong> · ${(d.size/1024).toFixed(1)} КБ`;
     document.getElementById("content").innerHTML = renderMd(d.content);
   } catch (e) {
     document.getElementById("content").innerHTML = `<p style="color:var(--color-danger)">${escape(e.message)}</p>`;
   }
 }
 document.getElementById("refreshBtn").onclick = () => {
   load();
   toast("Перечитал");
 };
 document.getElementById("updateBtn").onclick = async () => {
   const btn = document.getElementById("updateBtn");
   btn.disabled = true;
   btn.innerHTML = '<span class="updating">Opus генерит... (60-120 сек)</span>';
   try {
     const r = await fetch("/api/recommendations/regenerate", {
       method: "POST"
     });
     const d = await r.json();
     if (d.ok) {
       toast("Запущено в фоне, обновлю через минуту"); /* Polling */
       const before = Date.now();
       const initial = (await (await fetch("/api/recommendations?ts=" + Date.now())).json()).mtime || 0;
       while (Date.now() - before < 5 * 60 * 1000) {
         await new Promise(r => setTimeout(r, 5000));
         const now = await (await fetch("/api/recommendations?ts=" + Date.now())).json();
         if (now.mtime && now.mtime > initial) {
           load();
           toast("Готово");
           break;
         }
       }
     } else {
       toast("Ошибка: " + (d.error || " "), 6000);
     }
   } catch (e) {
     toast("Сеть: " + e.message);
   } finally {
     btn.disabled = false;
     btn.innerHTML = 'Перегенерировать через Opus';
   }
 };
 load();
</script> <script src="/static/sidebar.js"></script>
</body>
</html>
