<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Хранилище · Codex v2</title>
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<link rel="stylesheet" href="/static/tokens.css">
<link rel="stylesheet" href="/static/style.css">
<style> .summary-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; } .summary-card { background: var(--color-card); border: 1px solid var(--color-card-border); border-radius: 10px; padding: 12px 16px; min-width: 130px; box-shadow: var(--shadow-card); } .summary-label { font-size: 10px; color: var(--color-text-3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 4px; } .summary-value { font-size: 20px; font-weight: 700; color: var(--color-text); font-family: var(--font-mono); } .chapter-row { display: flex; align-items: center; gap: 12px; padding: 8px 4px; border-bottom: 1px solid var(--color-card-border); } .chapter-row:last-child { border-bottom: none; } .chapter-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--color-accent); } .chapter-title { flex: 1; font-size: 14px; color: var(--color-text); } .chapter-meta { font-size: 11px; color: var(--color-text-3); font-family: var(--font-mono); } .chapter-row-actions { display: flex; gap: 4px; } .chapter-row-actions a { color: var(--color-accent); text-decoration: none; font-size: 11px; padding: 4px 8px; border-radius: 6px; } .chapter-row-actions a:hover { background: var(--color-accent-bg); } .storage-actions-bar { position: sticky; bottom: 20px; background: var(--color-card); border: 1px solid var(--color-card-border); border-radius: 10px; padding: 12px 18px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow-popover); margin-top: 18px; } .storage-actions-bar .selected-count { font-size: 12px; color: var(--color-text-2); } .storage-empty { text-align: center; padding: 60px 20px; color: var(--color-text-3); font-size: 14px; }
</style>
</head>
<body>
<div class="app"> <aside class="sidebar" id="appSidebar" data-page="storage"></aside>
<script src="/static/nav.js"></script> <main class="page"> <header class="page-head"> <div> <h1>Хранилище</h1> <p class="page-sub">Финализированные главы, PDF, печать, экспорт</p> </div> <button class="btn btn-primary btn-sm" onclick="exportSelected()" id="exportBtn" disabled>Создать PDF из выбранных</button> </header> <div class="summary-row" id="storageSummary"></div> <div id="storageBooks"></div> <div class="storage-actions-bar" id="actionsBar" style="display:none"> <span class="selected-count" id="selectedCount">0 выбрано</span> <button class="btn btn-secondary btn-sm" onclick="selectAll(true)">Выбрать все</button> <button class="btn btn-ghost btn-sm" onclick="selectAll(false)">Снять все</button> <button class="btn btn-primary" onclick="exportSelected()" style="margin-left:auto">Создать PDF (открыть в новой вкладке)</button> </div>
</main> </div> <script src="/static/sidebar.js"></script>
<script>
function escape(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtNum(n) { return n.toLocaleString("ru-RU"); } async function load() { const r = await fetch("/api/storage/list"); const d = await r.json(); const summary = document.getElementById("storageSummary"); summary.innerHTML = ` <div class="summary-card"><div class="summary-label">Финальных глав</div><div class="summary-value">${d.total_chapters}</div></div> <div class="summary-card"><div class="summary-label">Книг с готовыми частями</div><div class="summary-value">${d.books.length}</div></div> <div class="summary-card"><div class="summary-label">Всего слов</div><div class="summary-value">${fmtNum(d.total_words)}</div></div> `; const root = document.getElementById("storageBooks"); if (!d.books.length) { root.innerHTML = `<section class="page-section storage-empty"> <div><strong>Пока нет финализированных глав</strong></div> <p>В редакторе для каждой главы есть кнопка <strong>«Финализировать»</strong>, после нажатия глава появится здесь, и из неё можно собрать PDF либо прочитать в режиме чтения.</p> </section>`; return; } root.innerHTML = d.books.map(b => ` <section class="page-section"> <h2>${escape(b.title)}</h2> ${b.chapters.map(ch => ` <label class="chapter-row"> <input type="checkbox" value="${ch.chapter_id}" onchange="updateBar()"> <div class="chapter-title">${ch.number ? `Гл.${ch.number} · ` : ""}${escape(ch.title)}</div> <div class="chapter-meta">${fmtNum(ch.words)} слов · ${(ch.chars/1024).toFixed(0)}KB</div> <div class="chapter-row-actions"> <a href="/read/${ch.chapter_id}" target="_blank">читать</a> <a href="/editor?chapter=${ch.chapter_id}">в редактор</a> <a href="/api/storage/export-html?chapters=${ch.chapter_id}" target="_blank">PDF</a> </div> </label> `).join("")} </section> `).join(""); document.getElementById("actionsBar").style.display = "flex";
} function updateBar() { const sel = Array.from(document.querySelectorAll("input[type=checkbox]:checked")); const n = sel.length; document.getElementById("selectedCount").textContent = `${n} выбрано`; document.getElementById("exportBtn").disabled = n === 0;
} function selectAll(state) { document.querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = state); updateBar();
} function exportSelected() { const sel = Array.from(document.querySelectorAll("input[type=checkbox]:checked")); if (!sel.length) return; const ids = sel.map(cb => cb.value).join(","); window.open(`/api/storage/export-html?chapters=${ids}`, "_blank");
} load();
</script>
</body>
</html>
